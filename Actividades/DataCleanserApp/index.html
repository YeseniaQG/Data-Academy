<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataCleanserApp - Yesenia Quiroz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f6fb;
      color: #333;
    }
    .header-bar {
      background: linear-gradient(135deg, #1e1e2f 0%, #3a3a6e 100%);
      color: #fff;
      padding: 2rem 0;
    }
    .img-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .img-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.13);
    }
    .img-card img {
      width: 100%;
      height: auto;
      cursor: pointer;
      transition: transform .3s;
    }
    .img-card img:hover {
      transform: scale(1.02);
    }
    .img-card .card-body {
      padding: 1rem 1.2rem;
    }
    .back-btn {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }
    .back-btn:hover {
      color: #6c63ff;
    }
  </style>
</head>
<body>

  <div class="header-bar">
    <div class="container">
      <a href="../../index.html#ejercicios" class="back-btn">
        <i class="bi bi-arrow-left me-1"></i> Volver al portafolio
      </a>
      <h1 class="mt-3 fw-bold">DataCleanserApp</h1>
      <p class="mb-0 opacity-75">Comparación de datos iniciales vs datos procesados</p>
    </div>
  </div>

  <div class="container py-5">
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card img-card">
          <img src="Comparaci%5BonDeDatos.png" alt="Comparación de Datos" class="card-img-top" />
          <div class="card-body">
            <h5 class="fw-bold mb-1">Comparación de Datos</h5>
            <p class="text-muted small mb-0">Visualización comparativa del proceso de limpieza de datos.</p>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card img-card">
          <img src="DatosInicialesVSDatosProcesados.png" alt="Datos Iniciales VS Datos Procesados" class="card-img-top" />
          <div class="card-body">
            <h5 class="fw-bold mb-1">Datos Iniciales VS Datos Procesados</h5>
            <p class="text-muted small mb-0">Contraste entre el estado inicial y final de los datos.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
